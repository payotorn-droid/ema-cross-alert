name: EMA Cross Alert
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  ema:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Download market data
        env:
          TZ: Asia/Bangkok
        run: python download.py
      - name: Generate report + upload + email
        env:
          TZ: Asia/Bangkok
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python report.py
      - name: Commit state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/report_state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "Update state [skip ci]"
            # Retry push up to 5 times with pull --rebase in between
            # Handles race conditions when local pushes happen during workflow run
            for i in 1 2 3 4 5; do
              if git push; then
                echo "Push succeeded on attempt $i"
                exit 0
              fi
              echo "Push attempt $i failed, pulling latest and retrying..."
              git pull --rebase origin main || {
                echo "Rebase failed on attempt $i"
                # If rebase has conflicts on state file, prefer our version
                git checkout --theirs data/report_state.json 2>/dev/null || true
                git add data/report_state.json 2>/dev/null || true
                git rebase --continue 2>/dev/null || git rebase --abort
              }
              sleep 3
            done
            echo "All push attempts failed"
            exit 1
          fi
      - name: Prepare Pages
        run: |
          mkdir -p _site
          cp data/ema_cross_report.html _site/index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
